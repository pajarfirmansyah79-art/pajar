<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu ❤️</title>
<style>
  body {
    background: #ffe6ea;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #d6336c;
  }
  .heart {
    width: 100px;
    height: 90px;
    background-color: #ff4d6d;
    position: relative;
    transform: rotate(-45deg);
    animation: heartbeat 1.2s infinite;
    margin-bottom: 30px;
  }
  .heart::before,
  .heart::after {
    content: "";
    width: 100px;
    height: 90px;
    background-color: #ff4d6d;
    border-radius: 50%;
    position: absolute;
  }
  .heart::before { top: -45px; left: 0; }
  .heart::after  { top: 0; left: 45px; }

  @keyframes heartbeat {
    0% { transform: rotate(-45deg) scale(1); }
    15% { transform: rotate(-45deg) scale(1.3); }
    30% { transform: rotate(-45deg) scale(1); }
    45% { transform: rotate(-45deg) scale(1.2); }
    60% { transform: rotate(-45deg) scale(1); }
    100% { transform: rotate(-45deg) scale(1); }
  }

  .message {
    font-size: 1.5rem;
    text-align: center;
    max-width: 80%;
    line-height: 1.6;
  }
  .name {
    font-weight: bold;
    font-size: 2rem;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="heart"></div>

<div class="message">
  <p>Hai <span class="name" id="nama">mel</span>,</p>
  <p>Kamu adalah alasan aku tersenyum setiap hari.<br>
   ❤️</p>
</div>

<script>
  // Ubah nama pasangan di bawah ini sesuai keinginanmu
  const namaPasangan = "mel";   // <-- Ganti dengan nama pasanganmu
  document.getElementById("nama").textContent = namaPasangan;
</script>

</body>
</html>
